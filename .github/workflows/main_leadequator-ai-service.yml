name: Build and deploy Python app to Azure Web App - leadequator-ai-service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ✅ Upload ONLY ai-service folder
      - name: Upload ai-service artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-service-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download ai-service artifact
        uses: actions/download-artifact@v4
        with:
          name: ai-service-app

      - name: Deploy ai-service to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: leadequator-ai-service
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: .
