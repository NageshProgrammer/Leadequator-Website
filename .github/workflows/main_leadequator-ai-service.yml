name: Build and deploy Python app to Azure Web App - leadequator-ai-service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ✅ Validate dependencies (no venv needed)
      - name: Install dependencies
        working-directory: ai-service
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ Upload ONLY ai-service
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-service-app
          path: ai-service

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ai-service-app
          path: ai-service

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: leadequator-ai-service
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8C98B0B659D84BC8991F0F38F47D8229 }}
